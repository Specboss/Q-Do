server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip для статики
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Хэшированные ассеты CRA (build/static/*) можно кэшировать надолго
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-фолбэк: любой маршрут отдаёт index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кэшируем, чтобы деплой сразу подхватывался
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
