services:
  web:
    build:
      context: .
      dockerfile: Containerfile
    image: q-do:latest
    container_name: q-do
    restart: unless-stopped
    # Хост:контейнер. Внутри nginx-unprivileged слушает 8080.
    # Порт 8080 на хосте биндится без прав root (rootless podman).
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Усиление безопасности
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
